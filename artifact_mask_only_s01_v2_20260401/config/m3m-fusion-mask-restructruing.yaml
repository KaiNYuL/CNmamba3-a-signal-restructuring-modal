# Minimal config for m3m-fusion-mask-restructruing
# Main model only: mask-only reconstruction

# Data and output
data: data/s01.dat
outdir: artifact_mask_only_s01_v2_20260401/results/runs/m3m-fusion-mask-restructruing-s01
selected_channels_1based: 8,10,15,21,22,23,24,26,27,28,31,35,36,37,38,39,40

# Runtime
seed: 42
device: auto

# Optimization
epochs: 120
batch_size: 8
lr: 1.0e-4
weight_decay: 0.01
patience: 12

# Model structure
d_model: 32
d_state: 64
headdim: 16
n_bi_layers: 2
chunk_size: 32
patch_size: 96
dropout: 0.15
preconv_kernel: 5
disable_preconv: "true"

# Mask-only reconstruction setup
input_ratio: 0.85
encoder_random_mask_ratio: 0.15
encoder_eval_mask_ratio: 0.15
mask_observed_residual: "true"
